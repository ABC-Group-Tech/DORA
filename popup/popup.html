<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DORA</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-title">
      <span class="logo">DORA</span>
      <span class="subtitle">Document Organizer</span>
    </div>
    <label class="toggle" title="확장 프로그램 활성화">
      <input type="checkbox" id="enabledToggle" />
      <span class="toggle-slider"></span>
    </label>
  </header>

  <!-- 기본 설정 -->
  <section class="section">
    <h2 class="section-title">기본 설정</h2>
    <div class="field">
      <label class="field-label" for="rootFolderInput">저장 경로 미지정 시 루트 폴더명</label>
      <input type="text" id="rootFolderInput" class="field-input" placeholder="AI출력물" maxlength="50" />
    </div>
    <div class="field field-row">
      <label class="field-label" for="etcToggle">미분류 파일 처리 (ETC)</label>
      <label class="toggle">
        <input type="checkbox" id="etcToggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button id="saveSettingsBtn" class="btn btn-primary">설정 저장</button>
    <p id="saveSettingsMsg" class="save-msg" aria-live="polite"></p>
  </section>

  <!-- AI 출처 관리 -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">AI 출처 관리</h2>
      <button id="addSourceBtn" class="btn btn-outline">+ 추가</button>
    </div>

    <!-- 출처 추가/수정 폼 (기본 hidden) -->
    <div id="sourceForm" class="source-form hidden">
      <div class="form-row">
        <input type="text" id="formName" class="field-input" placeholder="이름 (예: Gemini)" />
        <input type="text" id="formPrefix" class="field-input prefix-input" placeholder="접두어 (예: GMN)" maxlength="5" />
      </div>
      <input type="text" id="formPattern" class="field-input" placeholder="URL 패턴 (예: gemini.google.com)" />
      <div class="form-row">
        <input type="text" id="formDest" class="field-input" placeholder="저장 폴더 경로 (비워두면 기본 위치)" readonly />
        <button id="formPickBtn" class="btn btn-outline pick-btn">폴더 선택</button>
      </div>
      <div class="form-actions">
        <button id="formCancelBtn" class="btn btn-ghost">취소</button>
        <button id="formSaveBtn" class="btn btn-primary">저장</button>
      </div>
    </div>

    <!-- 출처 목록 -->
    <div id="sourceList" class="source-list"></div>
  </section>

  <!-- 최근 다운로드 로그 -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">최근 다운로드</h2>
      <button id="clearLogBtn" class="btn btn-ghost">초기화</button>
    </div>
    <div id="logList" class="log-list">
      <p class="empty-msg">로그가 없습니다.</p>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
