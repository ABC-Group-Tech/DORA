<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DORA</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <div class="header-title">
      <span class="logo">DORA</span>
      <span class="subtitle">Document Organizer</span>
    </div>
    <label class="toggle" title="확장 프로그램 활성화">
      <input type="checkbox" id="enabledToggle" />
      <span class="toggle-slider"></span>
    </label>
  </header>

  <!-- 설정 섹션 -->
  <section class="section">
    <h2 class="section-title">설정</h2>
    <div class="field">
      <label class="field-label" for="rootFolderInput">루트 폴더명</label>
      <input
        type="text"
        id="rootFolderInput"
        class="field-input"
        placeholder="AI출력물"
        maxlength="50"
      />
    </div>
    <div class="field field-row">
      <label class="field-label" for="etcToggle">미분류(ETC) 파일 처리</label>
      <label class="toggle">
        <input type="checkbox" id="etcToggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button id="saveBtn" class="btn btn-primary">설정 저장</button>
    <p id="saveMsg" class="save-msg" aria-live="polite"></p>
  </section>

  <!-- 로그 섹션 -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">최근 다운로드</h2>
      <button id="clearLogBtn" class="btn btn-ghost">초기화</button>
    </div>
    <div id="logList" class="log-list">
      <p class="empty-msg">로그가 없습니다.</p>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
