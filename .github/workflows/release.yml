name: Build & Release

# v* 태그가 푸시될 때 실행 (예: v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS 빌드 ──────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PyInstaller 설치
        run: pip install pyinstaller

      - name: macOS 앱 빌드
        run: |
          cd native
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name "DORA 설치" \
            --add-data "dora_host.py:." \
            installer_gui.py

      - name: .app 압축 (zip)
        run: |
          cd native/dist
          zip -r "DORA_설치_mac.zip" "DORA 설치.app"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: native/dist/DORA_설치_mac.zip

  # ── Windows 빌드 ────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PyInstaller 설치
        run: pip install pyinstaller

      - name: Windows exe 빌드
        run: |
          cd native
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name "DORA_설치" `
            --add-data "dora_host.py;." `
            installer_gui.py

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: native/dist/DORA_설치.exe

  # ── GitHub Release 생성 ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 코드 체크아웃 (설치가이드 txt 포함)
        uses: actions/checkout@v4

      - name: macOS 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./artifacts

      - name: Windows 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: 설치가이드 복사
        run: cp DORA_설치가이드.txt ./artifacts/DORA_설치가이드.txt

      - name: GitHub Release 생성 및 파일 첨부
        uses: softprops/action-gh-release@v2
        with:
          name: "DORA ${{ github.ref_name }}"
          body: |
            ## DORA ${{ github.ref_name }} 릴리즈

            ### 다운로드

            | 파일 | 설명 |
            |------|------|
            | `DORA_설치_mac.zip` | macOS 설치 앱 |
            | `DORA_설치.exe` | Windows 설치 실행 파일 |
            | `DORA_설치가이드.txt` | 설치 및 사용 방법 안내 |

            > **설치 전에 `DORA_설치가이드.txt`를 먼저 읽어주세요.**

            ### 빠른 시작
            1. `DORA_설치가이드.txt` 다운로드 후 내용 확인
            2. OS에 맞는 설치 파일 다운로드 후 더블클릭
            3. `chrome://extensions`에서 확인한 Extension ID 입력
            4. [설치 시작] 클릭 → Chrome 재시작
          files: |
            ./artifacts/DORA_설치_mac.zip
            ./artifacts/DORA_설치.exe
            ./artifacts/DORA_설치가이드.txt
          draft: false
          prerelease: false
