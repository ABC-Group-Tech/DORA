name: Build & Release

# v* 태그가 푸시될 때 실행 (예: v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 맥 빌드 ────────────────────────────────────────────────
  build-macos:
    name: Build 맥
    runs-on: macos-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python + Tcl/Tk 설치 (tkinter 포함 빌드)
        run: |
          brew install python-tk@3.11
          python3.11 -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"

      - name: PyInstaller 설치
        run: python3.11 -m pip install pyinstaller

      - name: 맥 앱 빌드
        run: |
          cd native
          python3.11 -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name "DORA_installer" \
            --add-data "dora_host.py:." \
            --collect-all tkinter \
            installer_gui.py

      - name: .app zip 압축
        run: |
          cd native/dist
          zip -r mac_app.zip "DORA_installer.app"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: native/dist/mac_app.zip

  # ── 윈도우 빌드 ─────────────────────────────────────────────
  build-windows:
    name: Build 윈도우
    runs-on: windows-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PyInstaller 설치
        run: pip install pyinstaller

      - name: 윈도우 exe 빌드
        run: |
          cd native
          pyinstaller --noconfirm --clean --windowed --onefile --name "DORA_installer" --add-data "dora_host.py;." installer_gui.py

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: native/dist/DORA_installer.exe

  # ── GitHub Release 생성 ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 코드 체크아웃 (확장 파일 + 가이드 포함)
        uses: actions/checkout@v4

      - name: 맥 앱 다운로드
        uses: actions/download-artifact@v4
        with:
          name: mac-app
          path: ./mac-app

      - name: 윈도우 exe 다운로드
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./win-exe

      # DORA_맥.zip 구성:
      #   DORA_맥/
      #   ├── DORA_installer.app/   ← 설치 앱
      #   ├── DORA_확장프로그램/     ← Chrome에 로드할 폴더
      #   └── DORA_설치가이드.txt
      - name: 맥 패키지 생성
        run: |
          mkdir -p DORA_mac/DORA_extension
          unzip mac-app/mac_app.zip -d DORA_mac/
          cp manifest.json background.js DORA_mac/DORA_extension/
          cp -r src popup icons DORA_mac/DORA_extension/
          cp DORA_설치가이드.txt DORA_mac/
          zip -r DORA_mac.zip DORA_mac/

      - name: 윈도우 패키지 생성
        run: |
          mkdir -p DORA_windows/DORA_extension
          cp win-exe/DORA_installer.exe DORA_windows/
          cp manifest.json background.js DORA_windows/DORA_extension/
          cp -r src popup icons DORA_windows/DORA_extension/
          cp DORA_설치가이드.txt DORA_windows/
          zip -r DORA_windows.zip DORA_windows/

      - name: GitHub Release 생성 및 파일 첨부
        uses: softprops/action-gh-release@v2
        with:
          name: "DORA ${{ github.ref_name }}"
          body: |
            ## DORA ${{ github.ref_name }}

            ### 다운로드

            | 파일 | 대상 |
            |------|------|
            | `DORA_mac.zip` | 맥 사용자 |
            | `DORA_windows.zip` | 윈도우 사용자 |

            > zip 하나에 설치 앱 + Chrome 확장 파일 + 설치가이드가 모두 포함되어 있습니다.

            ### 시작하기
            1. 본인 OS에 맞는 zip 파일 **하나만** 다운로드
            2. 압축 해제 후 `DORA_설치가이드.txt` 확인
            3. 설치 앱 실행 → Extension ID 입력 → 완료
          files: |
            DORA_mac.zip
            DORA_windows.zip
          draft: false
          prerelease: false
