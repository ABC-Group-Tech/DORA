name: Build & Release

# v* 태그가 푸시될 때 실행 (예: v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS 빌드 ──────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PyInstaller 설치
        run: pip install pyinstaller

      - name: macOS 앱 빌드
        run: |
          cd native
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name "DORA 설치" \
            --add-data "dora_host.py:." \
            installer_gui.py

      - name: .app 압축 (zip)
        run: |
          cd native/dist
          zip -r "DORA_설치_mac.zip" "DORA 설치.app"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: native/dist/DORA_설치_mac.zip

  # ── Windows 빌드 ────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PyInstaller 설치
        run: pip install pyinstaller

      - name: Windows exe 빌드
        run: |
          cd native
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name "DORA_설치" `
            --add-data "dora_host.py;." `
            installer_gui.py

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: native/dist/DORA_설치.exe

  # ── GitHub Release 생성 ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: macOS 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./artifacts

      - name: Windows 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: GitHub Release 생성 및 파일 첨부
        uses: softprops/action-gh-release@v2
        with:
          name: "DORA ${{ github.ref_name }}"
          body: |
            ## DORA ${{ github.ref_name }} 릴리즈

            ### 설치 방법
            1. 아래 파일 중 본인 OS에 맞는 파일을 다운로드하세요.
            2. 파일을 더블클릭하면 설치 화면이 열립니다.
            3. Extension ID를 입력하고 [설치 시작]을 클릭하세요.

            | OS | 파일 |
            |----|------|
            | macOS | `DORA_설치_mac.zip` → 압축 해제 후 `.app` 실행 |
            | Windows | `DORA_설치.exe` 직접 실행 |

            ### Chrome 확장 로드 방법
            `chrome://extensions` → 개발자 모드 ON → 압축해제된 확장 프로그램 로드 → DORA 폴더 선택
          files: |
            ./artifacts/DORA_설치_mac.zip
            ./artifacts/DORA_설치.exe
          draft: false
          prerelease: false
